<svg xmlns="http://www.w3.org/2000/svg" width="60" height="20" viewBox="0 0 60 20">
  <!-- Plus Icon -->
  <g transform="translate(0 0)">
    <rect x="5" y="7" width="10" height="2" fill="#94c0d4"/>
    <rect x="9" y="3" width="2" height="10" fill="#94c0d4"/>
  </g>
  
  <!-- Minus Icon -->
  <g transform="translate(20 0)">
    <rect x="5" y="7" width="10" height="2" fill="#94c0d4"/>
  </g>
  
  <!-- Multiply Icon (X) -->
  <g transform="translate(40 0)">
    <rect x="5" y="3" width="10" height="2" transform="rotate(45 10 4)" fill="#94c0d4"/>
    <rect x="5" y="3" width="10" height="2" transform="rotate(-45 10 4)" fill="#94c0d4"/>
  </g>
</svg>